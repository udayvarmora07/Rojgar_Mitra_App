name: Daily Job Scraper

on:
  schedule:
    # Run at 12:00 AM IST (6:30 PM UTC)
    # IST = UTC + 5:30, so 12:00 AM IST = 6:30 PM UTC previous day
    - cron: '30 18 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing

jobs:
  scrape-and-sync:
    name: Scrape Jobs & Sync to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Run scraper (Dry Run for safety)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scraper
          python scraper.py --dry-run

      # Uncomment below to enable actual database writes
      # - name: Run scraper (Production)
      #   if: github.event_name == 'schedule'
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      #   run: |
      #     cd scraper
      #     python scraper.py --no-dry-run

      - name: Upload scrape report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-report-${{ github.run_number }}
          path: scraper/scrape_report.json
          retention-days: 7